{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ shoe.name }} | ShoeHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            padding-top: 20px;
            color: #333;
            background: linear-gradient(135deg, #FFDAB9, #FFEFD5, #F5F5F5);
            background-size: 400% 400%;
            animation: shimmer 20s ease-in-out infinite alternate;
        }

        @keyframes shimmer {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card-detail {
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            padding: 20px;
            max-width: 500px;
            margin: 30px auto;
            text-align: center;
            box-shadow: 0 8px 20px rgba(255, 165, 0, 0.25), 0 12px 30px rgba(255, 140, 0, 0.2);
        }

        .card-detail img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 10px;
        }

        .btn-glow {
            background-color: #00ffcc;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(255, 165, 0, 0.4), 0 6px 25px rgba(255, 140, 0, 0.3);
            margin: 5px;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .btn-glow:hover {
            box-shadow: 0 8px 25px rgba(255, 165, 0, 0.5), 0 12px 35px rgba(255, 140, 0, 0.4);
            transform: translateY(-2px);
        }

        .alert-success {
            max-width: 500px;
            margin: 20px auto;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Success messages -->
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-success">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <!-- Shoe Card -->
    <div class="card-detail">
        <img src="{{ shoe.image.url }}" alt="{{ shoe.name }}">
        <h2 class="mt-3">{{ shoe.name }}</h2>
        <p class="h4">₹{{ shoe.price }}</p>

        <!-- Buttons -->
        <div class="mt-3">
            <!-- Add to Cart -->
            <form method="POST" action="{% url 'add_to_cart' shoe.id %}" style="display:inline;">
                {% csrf_token %}
                <button type="submit" class="btn-glow">Add to Cart</button>
            </form>

            <!-- Back to Home -->
            <a href="{% url 'home' %}" class="btn-glow">Back to Home</a>

            <!-- View Cart -->
            <a href="{% url 'view_cart' %}" class="btn-glow">View Cart</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
