<!DOCTYPE html>
<html>
<head>
    <title>ShoeHub</title>

    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="logo">
        <img src="{% static 'images/shoelogo.jpg' %}" width="50">
        ShoeHub 👟
    </div>

    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/contact/">Customer Queries</a>
    </div>
</nav>

<!-- SEARCH -->
<div class="search-box">
    <input type="text" placeholder="Search shoes...">
    <button>Search</button>
</div>

<!-- CONTENT -->
<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
