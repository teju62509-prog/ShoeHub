<!DOCTYPE html>
<html>
<head>
    <title>Contact</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
        }
        form {
            margin-top: 50px;
        }
        input, textarea {
            width: 300px;
            padding: 10px;
            margin: 10px;
        }
        button {
            padding: 10px 20px;
            background: black;
            color: white;
            border: none;
        }
    </style>
</head>
<body>

<h2>Contact Us</h2>

<form method="POST">
    {% csrf_token %}
    <input type="text" name="name" placeholder="Enter Name"><br>
    <input type="email" name="email" placeholder="Enter Email"><br>
    <textarea name="message" placeholder="Your Message"></textarea><br>
    <button type="submit">Send</button>
</form>

</body>
</html>
